name: Check Slots

on:
  schedule:
    # Every 10 minutes - regular slot checking
    - cron: '*/10 * * * *'
    # Every day at 7 PM Melbourne time (9 AM UTC, since Melbourne is UTC+11)
    - cron: '0 9 * * *'
  workflow_dispatch: # Allows manual trigger
  push:
    branches:
      - main # Keeps workflow active

jobs:
  run_checker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'
      
      - name: Install libraries
        run: pip install -r requirements.txt
      
      - name: Run Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID_TARAS: ${{ secrets.TELEGRAM_CHAT_ID_TARAS }}
          TELEGRAM_CHAT_ID_SOFIIA: ${{ secrets.TELEGRAM_CHAT_ID_SOFIIA }}
          # This will be 'true' only for the 9 AM UTC run (7 PM Melbourne)
          FORCE_STATUS_CHECK: ${{ github.event.schedule == '0 9 * * *' && 'true' || 'false' }}
        run: python main.py
